name: plugin-promote
description: >-
  Reconcile the trusted GHCR plugin namespace to match plugins.json (the
  marketplace catalog). mode=verify is the PR gate (check, no mutation);
  mode=reconcile is the merge action (make trusted == catalog). plugins.json's
  .plugins section is authoritative for the trusted (productive) set.

inputs:
  mode:
    description: "verify (check, no mutation) or reconcile (apply)."
    required: true
  owner:
    description: "GHCR owner. Defaults to the repository owner."
    required: false
    default: ${{ github.repository_owner }}
  registry:
    description: "OCI registry host."
    required: false
    default: ghcr.io
  trusted-namespace:
    description: "Trusted (validated) namespace."
    required: false
    default: plugins
  staging-namespace:
    description: "Staging (candidate) namespace."
    required: false
    default: plugins-staging
  manifest:
    description: "Path to the catalog (plugins.json). yq reads JSON natively."
    required: false
    default: plugins.json
  signers:
    description: "Path to signers.yaml (cosign identity allowlist)."
    required: false
    default: .github/plugins/signers.yaml
  gh-token:
    description: >-
      Token for gh api calls. Defaults to the calling workflow's GITHUB_TOKEN.
      Reconcile callers must supply a token with write:packages + delete:packages
      so gh api can delete trusted package versions.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    # gh, jq and yq are preinstalled on GitHub-hosted runners; cosign and oras
    # are not, so set them up here. SHA-pinned: this path runs `cosign verify`,
    # so a retagged installer could ship a tampered binary.
    - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
    - uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1.2.4

    - name: Reconcile trusted namespace
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        OWNER: ${{ inputs.owner }}
        REGISTRY: ${{ inputs.registry }}
        TRUSTED_NS: ${{ inputs.trusted-namespace }}
        STAGING_NS: ${{ inputs.staging-namespace }}
        MANIFEST: ${{ inputs.manifest }}
        SIGNERS: ${{ inputs.signers }}
        # gh / oras-blob / referrers REST calls authenticate with this token;
        # the caller is responsible for `oras login` / `cosign login` to GHCR
        # and for granting packages:write + delete:packages on reconcile.
        GH_TOKEN: ${{ inputs.gh-token }}
      run: bash "${GITHUB_ACTION_PATH}/reconcile.sh"
