name: ci
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install webkit2gtk (Tauri system dep)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: opencapital-app/src-tauri
      - name: build --lib
        working-directory: opencapital-app/src-tauri
        run: cargo build --lib
      - name: test --lib
        working-directory: opencapital-app/src-tauri
        run: cargo test --lib
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: install
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"
      - name: ruff
        run: .venv/bin/ruff check .
      - name: tests
        run: make test-unit
