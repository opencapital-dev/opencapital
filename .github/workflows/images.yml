name: images
on:
  push:
    branches: [main]
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - svc: control-plane
            context: services/control-plane
            dockerfile: services/control-plane/Dockerfile
            filter: "services/control-plane/**"
          - svc: gateway
            context: "."
            dockerfile: services/gateway/Dockerfile
            filter: |
              services/gateway/**
              lib/**
          - svc: read-gateway
            context: "."
            dockerfile: services/read-gateway/Dockerfile
            filter: |
              services/read-gateway/**
              lib/**
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: ${{ matrix.filter }}
      - if: steps.changed.outputs.any_changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - if: steps.changed.outputs.any_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/opencapital-dev/${{ matrix.svc }}:sha-${{ github.sha }}
            ghcr.io/opencapital-dev/${{ matrix.svc }}:main
