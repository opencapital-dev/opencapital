name: opencapital-cache-warm

# GitHub isolates Actions caches per tag/ref, but a tag-triggered run CAN fall
# back to caches on the DEFAULT branch. The opencapital-release workflow is
# tag-triggered, so distinct release tags never share caches — unless main holds
# warm ones. This job populates the expensive caches (cargo + node_modules + pip)
# in main's scope using the SAME keys as opencapital-release.yml, so a release
# tag cut from main restores them (cold ~10min -> warm ~3-5min).
#
# Paths-filtered so it only runs when the app or compute build inputs change.

on:
  push:
    branches: [main]
    paths:
      - "opencapital-app/**"
      - "services/compute/**"
      - ".github/workflows/opencapital-cache-warm.yml"
      - ".github/workflows/opencapital-release.yml"

permissions:
  contents: read

jobs:
  warm:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: opencapital-app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: opencapital-app/src-tauri

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: services/compute/freeze-requirements.txt

      - name: Cache node_modules
        id: node-modules
        uses: actions/cache@v4
        with:
          path: opencapital-app/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('opencapital-app/package-lock.json') }}

      - name: Install frontend deps
        if: steps.node-modules.outputs.cache-hit != 'true'
        working-directory: opencapital-app
        run: npm ci

      - name: Warm pip cache (compute freeze deps)
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then PY=.venv/Scripts/python; else PY=.venv/bin/python; fi
          "$PY" -m pip install -r services/compute/freeze-requirements.txt

      - name: Warm Rust cache (compile the crate's dependencies)
        working-directory: opencapital-app/src-tauri
        run: cargo build --release
