name: plugin-promote-check

# PR gate: verify (no mutation) every version that plugins.json would add to the
# trusted namespace — cosign signature under signers.yaml + footprint-collision.
on:
  pull_request:
    paths:
      - plugins.json
      - .github/plugins/signers.yaml

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Authenticate oras + cosign to GHCR. The action does not log in —
      # reconcile.sh requires the caller to handle auth. Read is sufficient.
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: ./.github/actions/plugin-promote
        with:
          mode: verify
          # gh-token defaults to github.token — read-only is sufficient for verify.
