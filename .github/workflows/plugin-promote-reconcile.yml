name: plugin-promote-reconcile

# Merge action: make the trusted GHCR namespace match plugins.json. For each
# version in .plugins, verify its cosign signature + footprint then
# `oras cp` plugins-staging -> plugins; delete trusted tags no longer listed.
# workflow_dispatch allows an on-demand reconcile without a plugins.json change.
on:
  push:
    branches: [main]
    paths:
      - plugins.json
  workflow_dispatch:

# Prevent two reconciles racing on the registry. cancel-in-progress:false lets
# the in-flight run finish so we never half-apply; the queued run executes after
# with the latest catalog.
concurrency:
  group: plugin-promote-reconcile
  cancel-in-progress: false

permissions:
  contents: read
  # Built-in GITHUB_TOKEN lacks delete:packages; all package mutations
  # (oras cp staging->trusted + gh api package-version deletes) go through
  # PLUGIN_PROMOTE_TOKEN below.
  packages: read

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # PLUGIN_PROMOTE_TOKEN must carry write:packages + delete:packages on the
      # org (PAT or GitHub App installation token).
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PLUGIN_PROMOTE_TOKEN }}

      - uses: ./.github/actions/plugin-promote
        with:
          mode: reconcile
          # PAT so gh api package-version DELETE calls are authorized; the
          # built-in GITHUB_TOKEN lacks delete:packages.
          gh-token: ${{ secrets.PLUGIN_PROMOTE_TOKEN }}
