name = "prices"
version = "0.2.0"
namespace = "prices"          # claims `prices.quote`, `prices.ohlcv`, `prices.option_mark` sub-namespaces
owner = "core"
description = """
Built-in plugin documenting and providing helper views over the `prices.quote`,
`prices.ohlcv`, and `prices.option_mark` namespaces on `data.v1`. The unifying
`prices` view used by core MtM metrics lives in the core schema (it's
load-bearing for the dense metric MVs); this plugin adds namespace-detailed
helper VIEWs (bid/ask, OHLCV columns separately, option marks) for callers
that want them, and serves as the canonical example for plugin authors.
The `option_mark` sub-namespace is fed by reference-admin from broker
statements (v3 Phase 3, ADR-0019); a future real-options vendor would
replace that producer without view changes.
"""
